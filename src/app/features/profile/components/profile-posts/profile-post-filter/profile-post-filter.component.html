<div
  class="flex flex-wrap items-center justify-between gap-2 rounded-2xl border border-slate-200 bg-white p-3 shadow-sm mb-5"
>
  <div
    class="grid w-full grid-cols-2 gap-2 rounded-xl bg-slate-100 p-1.5 sm:inline-flex sm:w-auto sm:gap-0"
  >
    <button
      [ngClass]="{
        'bg-white text-[#1877f2] shadow-sm': selectedFilter === 'all',
        'text-slate-600 hover:text-slate-900': selectedFilter !== 'all',
      }"
      (click)="setFilter('all')"
      class="inline-flex items-center justify-center gap-2 rounded-lg px-4 py-2 text-sm font-bold transition"
    >
      <i class="fa-regular fa-file-text"></i>
      My Posts</button
    ><button
      [ngClass]="{
        'bg-white text-[#1877f2] shadow-sm': selectedFilter === 'bookmarks',
        'text-slate-600 hover:text-slate-900': selectedFilter !== 'bookmarks',
      }"
      (click)="setFilter('bookmarks')"
      class="inline-flex items-center justify-center gap-2 rounded-lg px-4 py-2 text-sm font-bold transition"
    >
      <i class="fa-regular fa-bookmark"></i>
      Saved
    </button>
  </div>
  @if (currentPostsCount > 0) {
    <span class="rounded-full bg-[#e7f3ff] px-3 py-1 text-xs font-bold text-[#1877f2]">
      {{ currentPostsCount }}</span
    >
  }
</div>
