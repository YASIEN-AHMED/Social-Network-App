<section class="profile-posts mt-6 space-y-6">
  @if (!isLoading || isProfileOwner == true) {
    @if (isProfileOwner) {
      <app-profile-post-filter
        [posts]="posts"
        [currentPostsCount]="currentPostsCount"
        (loadFilteredPosts)="filterPosts($event)"
      ></app-profile-post-filter>
    }
    @for (post of filteredPosts; track post._id) {
      @if (isProfileOwner) {
        <div>
          <app-profile-post-card [post]="post"></app-profile-post-card>
        </div>
      } @else {
        <div>
          <app-post-card [post]="post"></app-post-card>
        </div>
      }
    } @empty {
      <div
        class="rounded-2xl border border-slate-200 bg-white p-5 text-center text-sm text-slate-500"
      >
        No posts yet.
      </div>
    }
  } @else {
    <div class="bg-white p-5 border border-slate-200 rounded-2xl">
      <p class="text-center">Loading...</p>
    </div>
  }
</section>
