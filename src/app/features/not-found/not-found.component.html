<div class="min-h-screen flex justify-center items-center flex-col">
  <h1 class="text-center text-5xl text-blue-700 font-medium mb-8">Linked Posts</h1>
  <div class="w-11/12 lg:w-5/12 bg-white rounded-[5px] p-8 text-center">
    <!-- 404 Number -->
    <h2 class="text-9xl font-bold text-blue-700 mb-4">404</h2>

    <!-- Main Message -->
    <h3 class="text-2xl text-blue-700 mb-3">Page Not Found</h3>

    <!-- Description -->
    <p class="text-sm text-gray-600 mb-6">
      Oops! The page you're looking for doesn't exist. It might have been moved or deleted.
    </p>

    <!-- Action Buttons -->
    <div class="flex flex-col sm:flex-row gap-3 justify-center items-center">
      <a
        href="/"
        class="text-white bg-blue-700 box-border border border-transparent hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none"
      >
        <i class="fa-solid fa-home mr-2"></i>
        Go Home
      </a>
      <button
        onclick="history.back()"
        class="text-blue-700 bg-white box-border border border-blue-700 hover:bg-blue-50 focus:ring-4 focus:ring-blue-300 shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none"
      >
        <i class="fa-solid fa-arrow-left mr-2"></i>
        Go Back
      </button>
    </div>
  </div>
</div>
