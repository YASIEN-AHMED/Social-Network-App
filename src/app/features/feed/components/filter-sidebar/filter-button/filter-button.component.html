<button
  [ngClass]="{
    'bg-[#e7f3ff] text-[#1877f2]': isSelected(),
    ' hover:bg-slate-100 bg-slate-50 lg:bg-white': !isSelected(),
  }"
  (click)="setFilter(filter)"
  class="flex w-full items-center justify-center lg:justify-start gap-3 rounded-xl px-3 py-2 text-left text-sm font-bold transition cursor-pointer"
>
  <i class="fa-solid fa-newspaper"></i> {{ title }}
</button>
