<div class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
  <div class="mb-3 flex items-center justify-between gap-2">
    <div class="flex items-center gap-2">
      <i class="fa-solid fa-users text-[#1877f2]"></i>
      <h3 class="text-base font-extrabold text-slate-900">Suggested Friends</h3>
    </div>
    <span class="rounded-full bg-slate-100 px-2 py-0.5 text-xs font-bold text-slate-600">{{
      suggestionCount
    }}</span>
  </div>
  <div class="mb-3">
    <label class="relative block">
      <i
        class="fa-solid fa-magnifying-glass text-slate-400 absolute left-3 top-1/2 -translate-y-1/2"
      ></i>
      <input
        [(ngModel)]="searchTerm"
        (input)="onSearchInput()"
        placeholder="Search friends..."
        class="w-full rounded-xl border border-slate-200 bg-slate-50 py-2 pl-9 pr-3 text-sm text-slate-700 outline-none focus:border-[#1877f2] focus:bg-white"
        value=""
    /></label>
  </div>

  <div
    [ngClass]="{ 'grid grid-cols-1 sm:grid-cols-2 gap-3': !isSideBar }"
    class="space-y-3 grid grid-cols-1 sm:grid-cols-2 gap-3"
  >
    @if (isLoading) {
      <div class="col-span-full">
        <app-suggestion-skeleton></app-suggestion-skeleton>
      </div>
      <div class="col-span-full">
        <app-suggestion-skeleton></app-suggestion-skeleton>
      </div>

      <div class="col-span-full">
        <app-suggestion-skeleton></app-suggestion-skeleton>
      </div>
    } @else {
      @for (suggestedUser of filteredSuggestedUsers; track suggestedUser._id) {
        <div>
          <app-suggestion-card
            [suggestedUser]="suggestedUser"
            (follow)="followUser($event)"
            [FollowingState]="
              loadingUserId === suggestedUser._id
                ? 'following'
                : suggestedUser.followed
                  ? 'followed'
                  : 'not-following'
            "
          ></app-suggestion-card>
        </div>
      } @empty {
        <p class="text-sm text-slate-500">No users matched your search.</p>
      }
    }
  </div>
  @if ((filteredSuggestedUsers.length >= 20 && !isLoading) || isSideBar) {
    <button
      [disabled]="isLoadingMore"
      routerLink="/suggestions"
      (click)="isSideBar ? navigateSuggestion() : loadMoreUsers()"
      class="mt-3 inline-flex w-full items-center justify-center gap-2 rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-bold text-slate-700 transition hover:bg-slate-100 disabled:opacity-60 disabled:cursor-not-allowed"
    >
      @if (isLoadingMore) {
        <i class="fa-solid fa-circle-notch  fa-spin"></i>
      }

      {{ viewMoreButtonText }}
    </button>
  }
</div>
