<div class="modal-overlay fixed inset-0 z-100 flex items-center justify-center bg-slate-900/65 p-4">
  <div class="w-full max-w-140 rounded-2xl border border-slate-200 bg-white shadow-2xl">
    <div class="flex items-center justify-between border-b border-slate-200 px-4 py-3">
      <h4 class="text-base font-extrabold text-slate-900">Share post</h4>
      <button
        [disabled]="isDisabled"
        (click)="onCancel()"
        type="button"
        class="inline-flex h-8 w-8 items-center justify-center rounded-full text-slate-500 transition hover:bg-slate-100 hover:text-slate-700 disabled:opacity-60"
      >
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
    <div class="space-y-3 p-4">
      <textarea
        [(ngModel)]="textareaContent"
        placeholder="Say something about this..."
        rows="3"
        maxlength="500"
        class="w-full resize-none rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-800 outline-none transition focus:border-[#1877f2] focus:ring-2 focus:ring-[#1877f2]/20"
      ></textarea>
      <div class="rounded-xl border border-slate-200 bg-slate-50 p-3">
        <div class="flex items-center gap-2">
          <img
            alt="Yasien Elkelany"
            class="h-8 w-8 rounded-full object-cover"
            [src]="post.user.photo || './images/default-profile.png'"
          />
          <div class="min-w-0">
            <p class="truncate text-sm font-bold text-slate-900">{{ post.user.name }}</p>
            <p class="truncate text-xs font-semibold text-slate-500">@member</p>
          </div>
        </div>
        <p class="mt-2 whitespace-pre-wrap text-sm text-slate-800">{{ post.body }}</p>
      </div>
    </div>
    <div class="flex items-center justify-end gap-2 border-t border-slate-200 px-4 py-3">
      <button
        [disabled]="isDisabled"
        (click)="onCancel()"
        type="button"
        class="rounded-lg border border-slate-300 px-4 py-2 text-sm font-bold text-slate-700 transition hover:bg-slate-100 disabled:opacity-60"
      >
        Cancel</button
      ><button
        [disabled]="isDisabled"
        (click)="onConfirm(textareaContent)"
        type="button"
        class="inline-flex items-center rounded-lg bg-[#1877f2] px-4 py-2 text-sm font-bold text-white transition hover:bg-[#166fe5] disabled:cursor-not-allowed disabled:opacity-60"
      >
        {{ isDisabled ? 'Sharing...' : 'Share now' }}
      </button>
    </div>
  </div>
</div>
