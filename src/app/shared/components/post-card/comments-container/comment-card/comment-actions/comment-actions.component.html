<div class="flex justify-between items-center">
  <div class="flex items-center gap-4 text-sm text-gray-500 *:text-xs">
    @if (isOlderThanTwoDays) {
      <span>{{ createdAt | date: 'MMM d, hh:mm a' }}</span>
    } @else {
      <span>{{ createdAt | timeago }}</span>
    }

    <button
      [disabled]="isLoadingCommentLike"
      (click)="onLikeComment()"
      [class.text-blue-500]="
        (!isLikedByCurrentUser() && isLoadingCommentLike) ||
        (isLikedByCurrentUser() && !isLoadingCommentLike)
      "
      class="hover:underline cursor-pointer disabled:cursor-not-allowed"
    >
      {{
        isLoadingCommentLike
          ? 'Liking...'
          : (isLikedByCurrentUser() ? 'Unlike' : 'Like') + `(${likes.length})`
      }}
    </button>

    @if (!isReply) {
      <button
        (click)="onReplyToComment()"
        [class]="isShowReplyForm ? 'text-blue-500' : ''"
        class="hover:underline hover:text-blue-500 cursor-pointer"
      >
        {{
          isShowReplyForm
            ? 'Hide replies'
            : getRepliesCount() > 0
              ? `Reply (${getRepliesCount()})`
              : 'Reply'
        }}
      </button>
    }
  </div>
  @if (isPostOwner() || isCommentOwner()) {
    <div class="relative">
      <button
        (click)="toggleDropdown()"
        class="ml-2 p-1 rounded-full text-gray-500 hover:bg-gray-100 transition-colors cursor-pointer"
        title="Post options"
      >
        <i class="fa-solid fa-ellipsis text-sm"></i>
      </button>

      <div
        [class.hidden]="!isDropdownOpen"
        class="z-10 hidden absolute right-0 top-full mt-1 bg-white border border-gray-200 rounded-lg shadow-md w-44"
      >
        <ul
          class="py-2 text-sm text-gray-800 font-medium"
          aria-labelledby="commentOptionsButton-{{ commentId }}"
        >
          @if (isCommentOwner()) {
            <li>
              <button
                (click)="onEditPost()"
                class="inline-flex gap-2 items-center w-full p-2 hover:bg-slate-50 rounded cursor-pointer"
              >
                <i class="fa-regular fa-pen-to-square"></i>
                Edit post
              </button>
            </li>
          }
          <li>
            <button
              (click)="onDeleteComment()"
              class="inline-flex gap-2 items-center w-full px-4 py-2 hover:bg-red-50 text-red-600 hover:text-red-700 rounded cursor-pointer transition-colors"
            >
              <i class="fa-solid fa-trash"></i>
              Delete
            </button>
          </li>
        </ul>
      </div>
    </div>
  }
</div>
