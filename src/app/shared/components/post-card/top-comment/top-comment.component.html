@if (comment) {
  <div class="mx-4 mb-4 rounded-2xl border border-slate-200 bg-slate-50 p-3">
    <p class="mb-2 text-[11px] font-bold uppercase tracking-wide text-slate-500">Top Comment</p>
    <div class="flex items-start gap-2">
      <img
        [alt]="comment.commentCreator.name"
        class="h-8 w-8 rounded-full object-cover"
        [src]="comment.commentCreator.photo"
      />
      <div class="min-w-0 flex-1 rounded-2xl bg-white px-3 py-2">
        <p class="truncate text-xs font-bold text-slate-900">
          {{ comment.commentCreator.name }}
        </p>
        <p class="mt-0.5 whitespace-pre-wrap text-sm text-slate-700">
          {{ comment.content }}
        </p>
      </div>
    </div>
    <button
      (click)="onViewAllComments()"
      class="mt-2 text-xs font-bold text-[#1877f2] hover:underline"
    >
      View all comments
    </button>
  </div>
}
