 <div class="px-4 pb-2 pt-3 text-sm text-slate-500">
    <div class="flex justify-between items-center">
      <div class="flex items-center gap-2">
        <span class="h-5 w-5 rounded-full bg-blue-500 flex items-center justify-center">
          <i class="fa-regular fa-thumbs-up text-white text-2xs"></i>
        </span>
        <button class="hover:underline hover:text-[#1877f2] font-medium transition cursor-pointer">
          {{ likesCount }} likes
        </button>
      </div>
      <div class="flex flex-wrap items-center gap-2 text-xs sm:gap-3 sm:text-sm">
        <div class="inline-flex items-center gap-1 rounded-full px-2 py-0.5 text-xs font-normal">
          <i class="fa-solid fa-share-square"></i>
          <span>{{ sharesCount }} shares</span>
        </div>
        <span>{{ commentsCount }} comments</span>
        <button
          (click)="onOpenDetailedPostView()"
          class="rounded-md px-2 py-1 text-xs font-semibold text-[#1877f2] hover:bg-[#e7f3ff] cursor-pointer"
        >
          View details
        </button>
      </div>
    </div>
  </div>
